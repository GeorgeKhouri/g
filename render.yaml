services:
  - type: web
    name: package-tracker
    env: node
    region: ohio
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: postgres-db
          property: connectionString
  - type: pserv
    name: postgres-db
    env: postgres
    plan: free
    region: ohio
