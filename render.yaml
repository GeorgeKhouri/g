services:
  - type: web
    name: package-tracker
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: BACKUP_INTERVAL_MINUTES
        value: 15
      - key: BACKUP_RETENTION_DAYS
        value: 14

databases:
  - name: postgres
    databaseName: packages_db
    user: postgres
    region: oregon
    plan: free
